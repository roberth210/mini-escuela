<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Escuela Matemática</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(130deg,#001133,#0033aa,#0066ff);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.panel{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,150,255,0.5);
text-align:center;
width:350px;
position:relative;
}

input{
width:80%;
padding:12px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00aaff;
color:white;
cursor:pointer;
}

/* PUNTOS ESQUINA */

#points{
position:absolute;
top:15px;
right:20px;
font-size:18px;
padding:8px 14px;
border-radius:10px;
background:#111;
transition:.3s;
font-weight:bold;
}

.positive{
color:#00ff88;
box-shadow:0 0 10px #00ff88;
}

.negative{
color:#ff4444;
box-shadow:0 0 10px red;
}

/* EJERCICIO */

#question{

font-size:36px;
margin:20px;
padding:20px;
border-radius:15px;

background:linear-gradient(145deg,#001a44,#002f88);

box-shadow:
0 0 20px rgba(0,140,255,0.8),
inset 0 0 15px rgba(0,200,255,0.4);

font-weight:bold;

}

/* OPCIONES */

#options{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.opt{
padding:15px;
font-size:20px;
border-radius:12px;
border:none;
cursor:pointer;
background:linear-gradient(145deg,#0077ff,#00bbff);
color:white;
transition:.2s;
}

.opt:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00aaff;
}

/* TOP */

.top{
margin-top:20px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}

/* NOMBRES */

.rankItem{
margin:5px;
font-size:16px;
}

.rankName{
font-weight:bold;
}

/* TOP 1 */

.gold{
color:#ffd700;
text-shadow:
0 0 5px #ffd700,
0 0 10px #ffcc00,
0 0 20px #ffaa00,
0 0 30px #ff8800;
}

/* TOP 2 */

.orange{
color:#ff9900;
text-shadow:
0 0 5px #ff9900,
0 0 10px #ff8800,
0 0 20px #ff6600;
}

/* TOP 3 */

.green{
color:#00ff88;
text-shadow:
0 0 5px #00ff88,
0 0 10px #00ffaa,
0 0 20px #00dd88;
}

</style>

</head>

<body>

<div class="panel">

<div id="login">

<h2>Acceso al juego</h2>

<input id="user" placeholder="usuario"><br>
<input id="pass" type="password" placeholder="contraseña"><br>

<button onclick="login()">Entrar</button>

</div>

<div id="game" style="display:none">

<h3 id="player"></h3>

<div id="points">0</div>

<div id="question"></div>

<div id="options"></div>

<br>

<div class="top">

<h3>TOP 5</h3>

<div id="ranking"></div>

</div>

</div>

</div>

<script>

const socket=io()

let username=""
let points=0

let a,b
let op

function login(){

fetch("/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

user:document.getElementById("user").value,
pass:document.getElementById("pass").value

})

})

.then(r=>r.json())
.then(d=>{

if(d.ok){

username=document.getElementById("user").value

points=d.points || 0

update()

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("player").innerText=username

newQuestion()

}else{

alert("usuario incorrecto")

}

})

}

function newQuestion(){

a=Math.floor(Math.random()*10)
b=Math.floor(Math.random()*10)

let ops=["+","-","*","/"]
op=ops[Math.floor(Math.random()*ops.length)]

if(op=="/"){
a=a*b
}

document.getElementById("question").innerText=a+" "+op+" "+b

let correct=eval(a+op+b)

let options=[
correct,
correct+Math.floor(Math.random()*3)+1,
correct-Math.floor(Math.random()*3)-1,
correct+2
]

options=options.sort(()=>Math.random()-0.5)

let html=""

options.forEach(o=>{

html+=`<button class="opt" onclick="choose(${o})">${o}</button>`

})

document.getElementById("options").innerHTML=html

}

function choose(value){

let correct=eval(a+op+b)

if(value===correct){

points++

}else{

points--

}

update()

socket.emit("score",{user:username,points:points})

newQuestion()

}

function update(){

let box=document.getElementById("points")

box.innerText=points

box.classList.remove("positive","negative")

if(points>=0){

box.classList.add("positive")

}else{

box.classList.add("negative")

}

}

socket.on("top",(data)=>{

let html=""

let medals=["🥇","🥈","🥉","🏅","🏅"]

data.forEach((p,i)=>{

let clase="rankName"
let crown=""

if(i===0){
clase="rankName gold"
crown=" 👑"
}

if(i===1){
clase="rankName orange"
}

if(i===2){
clase="rankName green"
}

html+=`
<div class="rankItem">
${medals[i]} <span class="${clase}">${p.user}${crown}</span> : ${p.points}
</div>
`

})

document.getElementById("ranking").innerHTML=html

})

</script>

<div id="topAlert" class="top-alert"></div>

</body>
</html>
